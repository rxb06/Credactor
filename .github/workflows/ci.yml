name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install --require-hashes -r requirements-ci.txt

      - name: Lint
        run: ruff check credactor/ tests/

      - name: Type check
        run: mypy credactor/

      - name: Test
        run: pytest tests/ -v

  self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Scan for credentials
        run: python -m credactor --ci --format sarif . > results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        with:
          sarif_file: results.sarif

  build-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Build package
        # --no-isolation: build with the hash-pinned setuptools installed above
        # instead of downloading the backend fresh and unpinned at build time.
        run: |
          pip install --require-hashes -r requirements-ci.txt
          python -m build --no-isolation

      - name: Audit wheel for supply chain attacks
        run: python scripts/audit_wheel.py
